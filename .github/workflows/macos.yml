name: Build macOS

on:
  push:
    branches:
      - main

jobs:
  build-macos:

    runs-on: macos-latest

    steps:

      - name: Checkout source
        uses: actions/checkout@v4


      #
      # ARM64 build
      #

      - name: Install ARM64 dependencies
        run: |
          brew install sfml taglib


      - name: Build ARM64
        working-directory: src
        run: |
          make clean
          make -f Makefile.macos ARCHS="-arch arm64"

          mv builds/mishplayer-arm64 builds/mishplayer-arm64.bin


      #
      # Intel build
      #

      - name: Install Rosetta
        run: |
          sudo softwareupdate --install-rosetta --agree-to-license


      - name: Install Intel Homebrew
        run: |
          arch -x86_64 /bin/bash -c \
          "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"


      - name: Install Intel dependencies
        run: |
          arch -x86_64 /usr/local/bin/brew install sfml taglib


      - name: Build x86_64
        working-directory: src
        run: |
          export PATH="/usr/local/bin:$PATH"

          make clean
          make -f Makefile.macos ARCHS="-arch x86_64"

          mv builds/mishplayer builds/mishplayer-x86_64.bin


      #
      # Universal executable
      #

      - name: Create Universal Binary
        working-directory: src
        run: |
          lipo \
            -create \
            builds/mishplayer-arm64.bin \
            builds/mishplayer-x86_64.bin \
            -output builds/mishplayer


      - name: Verify Universal Binary
        working-directory: src
        run: |
          file builds/mishplayer
          lipo -info builds/mishplayer


      #
      # Create .app bundle
      #

      - name: Create App Bundle
        run: |

          mkdir -p release/MishPlayer.app/Contents/MacOS
          mkdir -p release/MishPlayer.app/Contents/Frameworks
          mkdir -p release/MishPlayer.app/Contents/Resources


          cp src/builds/mishplayer \
          release/MishPlayer.app/Contents/MacOS/


          #
          # Bundle libraries
          #

          cp /opt/homebrew/lib/libsfml-*.dylib \
          release/MishPlayer.app/Contents/Frameworks/


          cp /opt/homebrew/lib/libtag.dylib \
          release/MishPlayer.app/Contents/Frameworks/


          #
          # Assets
          #

          cp -r assets/* \
          release/MishPlayer.app/Contents/Resources/


          #
          # Info.plist
          #

          cat > release/MishPlayer.app/Contents/Info.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
          "http://www.apple.com/DTDs/PropertyList-1.0.dtd">

          <plist version="1.0">
          <dict>

              <key>CFBundleName</key>
              <string>Mish Player</string>

              <key>CFBundleDisplayName</key>
              <string>Mish Player</string>

              <key>CFBundleIdentifier</key>
              <string>com.mish.player</string>

              <key>CFBundleExecutable</key>
              <string>mishplayer</string>

              <key>CFBundlePackageType</key>
              <string>APPL</string>

              <key>LSMinimumSystemVersion</key>
              <string>11.0</string>

          </dict>
          </plist>
          EOF


      #
      # Fix library lookup
      #

      - name: Fix dylib paths
        run: |

          install_name_tool \
          -add_rpath \
          "@executable_path/../Frameworks" \
          release/MishPlayer.app/Contents/MacOS/mishplayer



      #
      # Inspect
      #

      - name: Verify App
        run: |

          file release/MishPlayer.app/Contents/MacOS/mishplayer

          otool -L \
          release/MishPlayer.app/Contents/MacOS/mishplayer



      #
      # Upload
      #

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: mish-macos-universal-app
          path: release/