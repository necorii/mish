name: Build macOS

on:
  push:
    branches:
      - main

jobs:
  build-macos:

    runs-on: macos-latest

    steps:

      - name: Checkout source
        uses: actions/checkout@v4


      #
      # ARM64
      #

      - name: Install ARM64 dependencies
        run: |
          /opt/homebrew/bin/brew install sfml taglib


      - name: Build ARM64
        working-directory: src
        run: |
          make clean
          make -f Makefile.macos ARCH=arm64 BREW_PREFIX=/opt/homebrew

          mv builds/mishplayer-arm64 builds/mishplayer-arm64.bin



      #
      # Intel
      #

      - name: Install Rosetta
        run: |
          sudo softwareupdate --install-rosetta --agree-to-license


      - name: Install Intel Homebrew
        run: |
          arch -x86_64 /bin/bash -c \
          "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"


      - name: Install Intel dependencies
        run: |
          arch -x86_64 /usr/local/bin/brew install sfml taglib



      - name: Build x86_64
        working-directory: src
        run: |
          make clean
          make -f Makefile.macos ARCH=x86_64 BREW_PREFIX=/usr/local

          mv builds/mishplayer-x86_64 builds/mishplayer-x86_64.bin



      #
      # Universal executable
      #

      - name: Create Universal Binary
        working-directory: src
        run: |
          lipo \
            -create \
            builds/mishplayer-arm64.bin \
            builds/mishplayer-x86_64.bin \
            -output builds/mishplayer



      - name: Verify executable
        working-directory: src
        run: |
          file builds/mishplayer
          lipo -info builds/mishplayer



      #
      # Universal dylibs
      #

      - name: Create Universal dylibs
        run: |

          mkdir -p universal-libs


          for lib in \
          libsfml-graphics \
          libsfml-window \
          libsfml-audio \
          libsfml-system \
          libtag
          do

            lipo \
              /opt/homebrew/lib/$lib.dylib \
              /usr/local/lib/$lib.dylib \
              -create \
              -output universal-libs/$lib.dylib

          done



      - name: Verify dylibs
        run: |

          file universal-libs/*.dylib



      #
      # Create App Bundle
      #

      - name: Create App Bundle
        run: |

          mkdir -p release/MishPlayer.app/Contents/MacOS
          mkdir -p release/MishPlayer.app/Contents/Frameworks
          mkdir -p release/MishPlayer.app/Contents/Resources


          cp src/builds/mishplayer \
          release/MishPlayer.app/Contents/MacOS/mishplayer


          cp universal-libs/*.dylib \
          release/MishPlayer.app/Contents/Frameworks/


          cp -r assets/* \
          release/MishPlayer.app/Contents/Resources/



          cat > release/MishPlayer.app/Contents/Info.plist <<EOF
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">

            <plist version="1.0">
            <dict>

            <key>CFBundleName</key>
            <string>Mish Player</string>

            <key>CFBundleDisplayName</key>
            <string>Mish Player</string>

            <key>CFBundleIdentifier</key>
            <string>com.mish.player</string>

            <key>CFBundleExecutable</key>
            <string>mishplayer</string>

            <key>CFBundlePackageType</key>
            <string>APPL</string>

            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>

            </dict>
            </plist>
            EOF



      #
      # Fix library paths
      #

      - name: Fix dylib paths
        run: |


          APP=release/MishPlayer.app


          install_name_tool \
          -add_rpath \
          "@executable_path/../Frameworks" \
          $APP/Contents/MacOS/mishplayer



          for lib in $APP/Contents/Frameworks/*.dylib
          do

            install_name_tool \
            -id \
            "@rpath/$(basename $lib)" \
            "$lib"


            install_name_tool \
            -add_rpath \
            "@loader_path" \
            "$lib"

          done



          for lib in \
          libsfml-graphics \
          libsfml-window \
          libsfml-audio \
          libsfml-system \
          libtag
          do

            install_name_tool \
            -change \
            /opt/homebrew/lib/$lib.dylib \
            @rpath/$lib.dylib \
            $APP/Contents/MacOS/mishplayer


            install_name_tool \
            -change \
            /usr/local/lib/$lib.dylib \
            @rpath/$lib.dylib \
            $APP/Contents/MacOS/mishplayer

          done



      #
      # Verify everything
      #

      - name: Final verification
        run: |

          file release/MishPlayer.app/Contents/MacOS/mishplayer

          lipo -info \
          release/MishPlayer.app/Contents/MacOS/mishplayer


          otool -L \
          release/MishPlayer.app/Contents/MacOS/mishplayer


          otool -L \
          release/MishPlayer.app/Contents/Frameworks/*.dylib



      #
      # Upload
      #

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: mishplayer-macos-universal-app
          path: release/
          
      #
      # Smoke test
      #

      - name: Launch MishPlayer
        run: |

          APP=release/MishPlayer.app

          chmod +x \
          $APP/Contents/MacOS/mishplayer

          echo "Launching..."

          $APP/Contents/MacOS/mishplayer &

          PID=$!

          sleep 5

          if ps -p $PID > /dev/null
          then
            echo "✅ MishPlayer is still running."

            kill $PID
          else
            echo "❌ MishPlayer exited unexpectedly."

            exit 1
          fi